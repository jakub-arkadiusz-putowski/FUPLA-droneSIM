# config/px4/sitl_params.yaml
# ==============================================================================
# FUPLA-droneSIM: PX4 SITL Parameter Configuration
# ==============================================================================
# Automatically uploaded on every simulation start via node_px4_configurator.
# No manual 'pxh> param set' commands required.
#
# Type rules (critical — wrong type causes incorrect values in PX4):
#   INT32 parameters  → integer literal without decimal point  (e.g. 1)
#   REAL32 parameters → float literal with decimal point       (e.g. 3.0)
#
# Reference: https://docs.px4.io/main/en/advanced_config/parameter_reference.html
# ==============================================================================

# --- MAVLink System ID --------------------------------------------------------
# Must match target_system in node_joy_to_rc and node_px4_configurator.
# PX4 SITL default: instance_id + 1 → drone 1 = MAV_SYS_ID 2
# If this changes, update default_value='2' in sim.launch.py accordingly.
MAV_SYS_ID: 2

# --- RC / Joystick Input ------------------------------------------------------
# Required for node_joy_to_rc to control the drone via MAVLink MANUAL_CONTROL.
COM_RC_IN_MODE: 1       # 0=RC only, 1=Joystick only, 2=RC+Joystick

# --- Failsafe Configuration ---------------------------------------------------
# Tuned for SITL testing — prevents unwanted disarms during development.
COM_RC_LOSS_T: 3.0      # Seconds before RC loss failsafe triggers (default: 1.0)
NAV_RCL_ACT: 3          # RC loss action: 3=return to launch
COM_RCL_EXCEPT: 7       # Ignore RC loss in manual+stabilized+acro modes
NAV_DLL_ACT: 0          # Disable data link loss failsafe

# --- Arming -------------------------------------------------------------------
COM_PREARM_MODE: 0      # Disable prearm checks (irrelevant in SITL)
COM_ARM_WO_GPS: 1       # Allow arming without GPS fix